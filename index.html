<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEERTIEN BS — POST GENERATOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Nova+Round&display=swap" rel="stylesheet">
<style>
/* ─── Design tokens ─────────────────────────────── */
:root {
  --primary:   #DF5B30;
  --primary-h: #e86d3f;
  --surface:   #F4F1ED;
  --surface2:  #ECEAE5;
  --border:    #DF2EC4;
  --white:     #FFFFFF;
  --ink:       #1a1a1a;
  --ink2:      #555;
  --ink3:      #999;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  --transition: 160ms cubic-bezier(.4,0,.2,1);
}

/* ─── Reset ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{
  background: var(--surface);
  color: var(--ink);
  font-family: var(--font);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── Layout ─────────────────────────────────────── */
.app-header{
  background: var(--white);
  border-bottom: 1px solid rgba(0,0,0,.08);
  padding: 0 28px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.app-header .logo{
  font-size: .78rem;
  font-weight: 600;
  letter-spacing: .12em;
  color: var(--primary);
}
.app-header .sep{ width:1px; height:18px; background:rgba(0,0,0,.12); }
.app-header .subtitle{ font-size:.75rem; color:var(--ink3); letter-spacing:.06em; }

/* tabs */
.tab-bar{
  background: var(--white);
  border-bottom: 1px solid rgba(0,0,0,.08);
  display: flex;
  padding: 0 24px;
  gap: 0;
}
.tab-btn{
  font-family: var(--font);
  font-size: .8rem;
  font-weight: 500;
  color: var(--ink3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 14px 18px 12px;
  cursor: pointer;
  letter-spacing: .04em;
  transition: color var(--transition), border-color var(--transition);
  white-space: nowrap;
}
.tab-btn.active{ color: var(--primary); border-bottom-color: var(--primary); }
.tab-btn:hover:not(.active){ color: var(--ink2); }

/* page */
.page{ display:none; }
.page.active{ display:block; }

.container{
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}

/* ─── Section label ──────────────────────────────── */
.section-label{
  font-size: .68rem;
  font-weight: 600;
  letter-spacing: .14em;
  color: var(--ink3);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after{
  content:'';
  flex:1;
  height:1px;
  background: rgba(0,0,0,.1);
}

/* ─── Card ───────────────────────────────────────── */
.card{
  background: var(--white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 22px 20px;
  margin-bottom: 16px;
  border: 1px solid rgba(0,0,0,.06);
}

/* ─── Form elements ──────────────────────────────── */
.field-label{
  display: block;
  font-size: .72rem;
  font-weight: 500;
  color: var(--ink2);
  margin-bottom: 6px;
  letter-spacing: .03em;
}

input[type=text],
input[type=number],
select {
  width: 100%;
  height: 40px;
  background: var(--surface);
  border: 1px solid rgba(0,0,0,.1);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: .88rem;
  color: var(--ink);
  padding: 0 12px;
  margin-bottom: 14px;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  -webkit-appearance: none;
}
input:focus, select:focus{
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(223,91,48,.15);
  background: var(--white);
}
select option{ background: #fff; }

.row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.row3{ display:grid; grid-template-columns:1fr 44px 1fr; gap:8px; align-items:end; }
.vs-mark{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.72rem;
  font-weight:600;
  letter-spacing:.08em;
  color:var(--ink3);
  margin-bottom:14px;
}

/* ─── Buttons ────────────────────────────────────── */
.btn{
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: var(--font);
  font-size: .85rem;
  font-weight: 500;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  padding: 0 18px;
  height: 40px;
  letter-spacing: .03em;
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
}
.btn-primary{
  background: var(--primary);
  color: #fff;
  width: 100%;
  height: 44px;
  font-size: .9rem;
  font-weight: 600;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  margin-top: 4px;
}
.btn-primary:hover{ background: var(--primary-h); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-primary:active{ transform: translateY(0); }

.btn-ghost{
  background: var(--surface);
  border: 1.5px dashed rgba(0,0,0,.15);
  color: var(--ink3);
  width: 100%;
  margin-bottom: 10px;
  font-size: .82rem;
}
.btn-ghost:hover{ border-color: var(--primary); color: var(--primary); background: rgba(223,91,48,.04); }

.btn-outline{
  background: var(--white);
  border: 1.5px solid var(--primary);
  color: var(--primary);
  width: 100%;
  height: 40px;
  font-size: .82rem;
  border-radius: var(--radius-sm);
}
.btn-outline:hover{ background: rgba(223,91,48,.06); }

.btn-icon{
  background: transparent;
  border: none;
  color: rgba(0,0,0,.25);
  cursor: pointer;
  padding: 4px 6px;
  font-size: 1rem;
  border-radius: 4px;
  transition: color var(--transition), background var(--transition);
  line-height:1;
}
.btn-icon:hover{ color: #e03535; background: rgba(224,53,53,.08); }

/* ─── Chips (roster) ─────────────────────────────── */
.chip-wrap{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; min-height:36px; }
.chip{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid rgba(0,0,0,.08);
  border-radius: 20px;
  padding: 4px 10px 4px 10px;
  font-size: .78rem;
  color: var(--ink2);
}
.chip-badge{
  background: rgba(223,91,48,.12);
  color: var(--primary);
  font-family: var(--mono);
  font-size: .7rem;
  font-weight: 500;
  border-radius: 4px;
  padding: 1px 5px;
  min-width: 24px;
  text-align: center;
}

/* ─── Scorer rows ────────────────────────────────── */
.scorer-row{
  display: grid;
  grid-template-columns: 1fr 100px 32px;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.scorer-row select{ margin-bottom:0; }

/* ─── Photo upload ───────────────────────────────── */
.photo-drop{
  border: 2px dashed rgba(0,0,0,.12);
  border-radius: var(--radius-md);
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  position: relative;
  overflow: hidden;
  background: var(--surface);
}
.photo-drop:hover{ border-color: var(--primary); background: rgba(223,91,48,.04); }
.photo-drop input[type=file]{
  position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; margin:0; padding:0;
}
.photo-drop-icon{ font-size:2rem; margin-bottom:8px; opacity:.5; }
.photo-drop p{ font-size:.78rem; color:var(--ink3); }
.photo-drop strong{ font-size:.84rem; font-weight:500; color:var(--ink2); }
#photoPreview{
  width:100%; border-radius:var(--radius-sm); margin-top:12px;
  display:none; max-height:200px; object-fit:cover;
}

/* ─── Output ─────────────────────────────────────── */
.output-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 28px;
}
@media(max-width:620px){ .output-grid{grid-template-columns:1fr;} }

canvas#scoreCard{
  width:100%; border-radius:var(--radius-md); display:block; margin-bottom:12px;
  box-shadow: var(--shadow-md);
}

.caption-box{
  background: var(--surface);
  border: 1px solid rgba(0,0,0,.08);
  border-radius: var(--radius-md);
  font-size:.84rem;
  line-height:2;
  padding:16px;
  white-space:pre-wrap;
  word-break:break-word;
  min-height:140px;
  margin-bottom:12px;
  color: var(--ink2);
  font-family: var(--mono);
}

.copied{ border-color: #2ecc71 !important; color: #2ecc71 !important; }

/* ─── Add-row helpers ────────────────────────────── */
.add-row-2{ display:grid; grid-template-columns:60px 1fr auto; gap:8px; align-items:end; }
.add-row-1{ display:grid; grid-template-columns:1fr auto; gap:8px; align-items:end; }
.add-row-2 input, .add-row-2 select,
.add-row-1 input, .add-row-1 select{ margin-bottom:0; }
.add-row-2 .btn, .add-row-1 .btn{ margin:0; width:auto; padding:0 14px; }

/* ─── Alert / hint ───────────────────────────────── */
.hint{
  font-size:.74rem;
  color:var(--ink3);
  padding:12px 14px;
  background: rgba(223,91,48,.05);
  border:1px solid rgba(223,91,48,.15);
  border-radius:var(--radius-sm);
  line-height:1.7;
}
</style>
</head>
<body>

<header class="app-header">
  <span class="logo">VBS</span>
  <span class="sep"></span>
  <span class="subtitle">POST GENERATOR</span>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('post')">投稿作成</button>
  <button class="tab-btn" onclick="switchTab('roster')">選手</button>
  <button class="tab-btn" onclick="switchTab('tournaments')">大会</button>
  <button class="tab-btn" onclick="switchTab('opponents')">対戦相手</button>
</nav>

<!-- ══════════ POST ══════════ -->
<div class="page active" id="page-post">
<div class="container">

  <div class="card">
    <div class="section-label">試合情報</div>
    <div class="row2">
      <div>
        <label class="field-label">大会名</label>
        <select id="tournament"><option value="">— 選択 —</option></select>
      </div>
      <div>
        <label class="field-label">カテゴリー</label>
        <select id="category">
          <option value="男子">男子</option>
          <option value="女子">女子</option>
        </select>
      </div>
    </div>

    <label class="field-label">試合結果</label>
    <select id="result">
      <option value="win">⚪ 勝利</option>
      <option value="loss">⚫ 敗戦</option>
      <option value="draw">△ 引き分け</option>
    </select>

    <div class="row3">
      <div>
        <label class="field-label">自チームスコア</label>
        <select id="ourScore"></select>
      </div>
      <div class="vs-mark">VS</div>
      <div>
        <label class="field-label">相手スコア</label>
        <select id="theirScore"></select>
      </div>
    </div>

    <label class="field-label">対戦相手</label>
    <select id="opponent"><option value="">— 選択 —</option></select>
  </div>

  <div class="card">
    <div class="section-label">EX / PK</div>
    <div class="row2">
      <div>
        <label class="field-label">EX — 自チーム</label>
        <select id="exScoreL"><option value="">なし</option></select>
      </div>
      <div>
        <label class="field-label">EX — 相手</label>
        <select id="exScoreR"><option value="">なし</option></select>
      </div>
    </div>
    <div class="row2">
      <div>
        <label class="field-label">PK — 自チーム</label>
        <select id="pkScoreL"><option value="">なし</option></select>
      </div>
      <div>
        <label class="field-label">PK — 相手</label>
        <select id="pkScoreR"><option value="">なし</option></select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">得点者</div>
    <div id="scorerList"></div>
    <button class="btn btn-ghost" onclick="addScorerRow()">+ 得点者を追加</button>
    <label class="field-label">追加ハッシュタグ（任意）</label>
    <input type="text" id="extraTag" placeholder="例：#碧南カップ">
  </div>

  <div class="card">
    <div class="section-label">写真</div>
    <div class="photo-drop" id="photoDrop">
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
      <div class="photo-drop-icon">📸</div>
      <strong>写真をアップロード</strong>
      <p>タップ or ドラッグ&ドロップ</p>
    </div>
    <img id="photoPreview" alt="preview">
    <button class="btn btn-ghost" id="clearPhotoBtn" style="display:none;margin-top:8px;" onclick="clearPhoto()">✕ 写真を削除</button>
  </div>

  <button class="btn btn-primary" onclick="generate()">▶ 生成する</button>

  <div id="outputWrap" style="display:none;">
    <div class="output-grid">
      <div>
        <canvas id="scoreCard" width="1080" height="1350"></canvas>
        <button class="btn btn-outline" onclick="downloadImage()">↓ ダウンロード</button>
      </div>
      <div>
        <div class="caption-box" id="captionOut"></div>
        <button class="btn btn-outline" id="copyBtn" onclick="copyCaption()">コピー</button>
      </div>
    </div>
  </div>

</div>
</div>

<!-- ══════════ ROSTER ══════════ -->
<div class="page" id="page-roster">
<div class="container">
  <div class="card">
    <div class="section-label">登録選手</div>
    <div class="chip-wrap" id="playerChips"></div>
    <div class="add-row-2">
      <div><label class="field-label">背番号</label><select id="newPNum"></select></div>
      <div><label class="field-label">選手名</label><input type="text" id="newPName" placeholder="林 翔太郎" onkeydown="if(event.key==='Enter')addPlayer()"></div>
      <button class="btn btn-primary" style="width:auto;padding:0 16px;height:40px;font-size:.82rem;" onclick="addPlayer()">追加</button>
    </div>
  </div>
  <p class="hint">登録データはブラウザに保存されます。</p>
</div>
</div>

<!-- ══════════ TOURNAMENTS ══════════ -->
<div class="page" id="page-tournaments">
<div class="container">
  <div class="card">
    <div class="section-label">大会登録</div>
    <div class="chip-wrap" id="tournamentChips"></div>
    <div class="add-row-1">
      <div><label class="field-label">大会名</label><input type="text" id="newTName" placeholder="HEKINAN CUP 2025" onkeydown="if(event.key==='Enter')addTournament()"></div>
      <button class="btn btn-primary" style="width:auto;padding:0 16px;height:40px;font-size:.82rem;" onclick="addTournament()">追加</button>
    </div>
  </div>
  <p class="hint">大会名はキャプションのハッシュタグにも使われます。</p>
</div>
</div>

<!-- ══════════ OPPONENTS ══════════ -->
<div class="page" id="page-opponents">
<div class="container">
  <div class="card">
    <div class="section-label">対戦相手登録</div>
    <div class="chip-wrap" id="opponentChips"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;">
      <div>
        <label class="field-label">チーム名（日本語）</label>
        <input type="text" id="newOName" placeholder="浜松BSCアレイア" style="margin-bottom:0;">
      </div>
      <div>
        <label class="field-label">チーム名（英語・画像に使用）</label>
        <input type="text" id="newONameEn" placeholder="AREYA" style="margin-bottom:0;">
      </div>
      <button class="btn btn-primary" style="width:auto;padding:0 16px;height:40px;font-size:.82rem;margin-top:0;" onclick="addOpponent()">追加</button>
    </div>
  </div>
  <p class="hint">英語名は画像の相手スコア下のチーム名に反映されます。左のVEERTIENは固定です。</p>
</div>
</div>

<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let players     = [];
let tournaments = [];
let opponents   = [];   // {name, nameEn}
let scorerRows  = [];
let photoDataURL = null;

const SK = { players:'vbs_players', tournaments:'vbs_tournaments', opponents:'vbs_opponents' };

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
function init() {
  initNumSelect('newPNum', 1, 99);
  initNumSelect('ourScore', 0, 30);
  initNumSelect('theirScore', 0, 30);
  ['exScoreL','exScoreR','pkScoreL','pkScoreR'].forEach(id => initNumSelectOptional(id, 0, 30));

  players     = JSON.parse(localStorage.getItem(SK.players)     || 'null') || [
    {num:1,  name:'林翔太郎'},
    {num:7,  name:'吉田恭平'},
    {num:10, name:'柳生理央輝'},
    {num:11, name:'佐藤栄祐'},
  ];
  tournaments = JSON.parse(localStorage.getItem(SK.tournaments) || 'null') || ['HEKINAN CUP 2025'];
  opponents   = JSON.parse(localStorage.getItem(SK.opponents)   || 'null') || [
    {name:'浜松BSCアレイア', nameEn:'AREYA'}
  ];

  saveAll();
  renderAll();
  addScorerRow();
}

function initNumSelect(id, min, max) {
  const sel = document.getElementById(id);
  if (!sel) return;
  sel.innerHTML = '';
  for (let i = min; i <= max; i++) {
    const o = document.createElement('option');
    o.value = i; o.textContent = i; sel.appendChild(o);
  }
  sel.value = min;
}

function initNumSelectOptional(id, min, max) {
  const sel = document.getElementById(id);
  if (!sel) return;
  sel.innerHTML = '<option value="">なし</option>';
  for (let i = min; i <= max; i++) {
    const o = document.createElement('option');
    o.value = i; o.textContent = i; sel.appendChild(o);
  }
}

function saveAll() {
  Object.keys(SK).forEach(k => localStorage.setItem(SK[k], JSON.stringify(eval(k))));
}

// ════════════════════════════════════════
//  TABS
// ════════════════════════════════════════
function switchTab(id) {
  const tabs = ['post','roster','tournaments','opponents'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===id));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function renderAll() {
  // player chips
  renderChips('playerChips', players,
    p => `<span class="chip-badge">${p.num}</span>${p.name}`,
    p => removePlayer(p.num));

  // tournament chips
  renderChips('tournamentChips', tournaments, t => t, t => removeTournament(t));

  // opponent chips — show ja + en
  renderChips('opponentChips', opponents,
    o => `${o.name} <span style="color:var(--ink3);font-size:.72rem;">${o.nameEn}</span>`,
    o => removeOpponent(o.name));

  refreshDropdown('tournament', tournaments, t => ({v:t, l:t}));
  refreshDropdown('opponent',   opponents,   o => ({v:o.name, l:`${o.name} / ${o.nameEn}`}));
  refreshScorerSelects();
}

function renderChips(id, items, labelFn, removeFn) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'chip';
    div.innerHTML = `<span>${labelFn(item)}</span>`;
    const btn = document.createElement('button');
    btn.className = 'btn-icon'; btn.textContent = '×';
    btn.onclick = () => removeFn(item);
    div.appendChild(btn);
    el.appendChild(div);
  });
}

function refreshDropdown(id, items, mapFn) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = '<option value="">— 選択 —</option>';
  items.forEach(item => {
    const {v,l} = mapFn(item);
    const o = document.createElement('option');
    o.value=v; o.textContent=l;
    if(v===cur) o.selected=true;
    sel.appendChild(o);
  });
}

// ════════════════════════════════════════
//  PLAYERS
// ════════════════════════════════════════
function addPlayer() {
  const num  = parseInt(document.getElementById('newPNum').value);
  const name = document.getElementById('newPName').value.trim();
  if (!name) return;
  if (players.find(p => p.num === num)) { alert('同じ番号が存在します'); return; }
  players.push({num, name});
  players.sort((a,b) => a.num - b.num);
  saveAll(); renderAll();
  document.getElementById('newPName').value = '';
}
function removePlayer(num) { players = players.filter(p => p.num!==num); saveAll(); renderAll(); }

// ════════════════════════════════════════
//  TOURNAMENTS
// ════════════════════════════════════════
function addTournament() {
  const name = document.getElementById('newTName').value.trim();
  if (!name || tournaments.includes(name)) return;
  tournaments.push(name);
  saveAll(); renderAll();
  document.getElementById('newTName').value = '';
}
function removeTournament(name) { tournaments = tournaments.filter(t=>t!==name); saveAll(); renderAll(); }

// ════════════════════════════════════════
//  OPPONENTS
// ════════════════════════════════════════
function addOpponent() {
  const name   = document.getElementById('newOName').value.trim();
  const nameEn = document.getElementById('newONameEn').value.trim().toUpperCase();
  if (!name) return;
  if (opponents.find(o => o.name===name)) return;
  opponents.push({name, nameEn: nameEn || name.toUpperCase()});
  saveAll(); renderAll();
  document.getElementById('newOName').value = '';
  document.getElementById('newONameEn').value = '';
}
function removeOpponent(name) { opponents = opponents.filter(o=>o.name!==name); saveAll(); renderAll(); }

// ════════════════════════════════════════
//  SCORER ROWS
// ════════════════════════════════════════
function playerOptions(selected='') {
  const opts = players.sort((a,b)=>a.num-b.num).map(p=>
    `<option value="${p.name}" ${p.name===selected?'selected':''}>${p.num}. ${p.name}</option>`
  ).join('');
  return '<option value="">— 選択 —</option>'+opts;
}

function addScorerRow() {
  const id = Date.now();
  scorerRows.push({id, name:'', goals:1});
  const list = document.getElementById('scorerList');
  const div = document.createElement('div');
  div.className = 'scorer-row'; div.id = 'sr-'+id;
  div.innerHTML = `
    <select onchange="updateScorer(${id},'name',this.value)">${playerOptions()}</select>
    <select onchange="updateScorer(${id},'goals',parseInt(this.value))">
      ${[1,2,3,4,5,6,7].map(n=>`<option value="${n}">${'⚽'.repeat(n)}</option>`).join('')}
    </select>
    <button class="btn-icon" onclick="removeScorerRow(${id})">×</button>
  `;
  list.appendChild(div);
}
function removeScorerRow(id) {
  scorerRows = scorerRows.filter(s=>s.id!==id);
  document.getElementById('sr-'+id)?.remove();
}
function updateScorer(id, field, value) {
  const s = scorerRows.find(x=>x.id===id);
  if(s) s[field]=value;
}
function refreshScorerSelects() {
  scorerRows.forEach(s => {
    const row = document.getElementById('sr-'+s.id);
    if(row) row.querySelector('select').innerHTML = playerOptions(s.name);
  });
}

// ════════════════════════════════════════
//  PHOTO
// ════════════════════════════════════════
function handlePhoto(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoDataURL = ev.target.result;
    const prev = document.getElementById('photoPreview');
    prev.src = photoDataURL; prev.style.display = 'block';
    document.getElementById('clearPhotoBtn').style.display = 'block';
    document.getElementById('photoDrop').style.borderColor = 'var(--primary)';
  };
  reader.readAsDataURL(file);
}
function clearPhoto() {
  photoDataURL = null;
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('clearPhotoBtn').style.display = 'none';
  document.getElementById('photoInput').value = '';
  document.getElementById('photoDrop').style.borderColor = '';
}

// ════════════════════════════════════════
//  GENERATE
// ════════════════════════════════════════
function generate() {
  const tournament = document.getElementById('tournament').value;
  const category   = document.getElementById('category').value;
  const result     = document.getElementById('result').value;
  const ourScore   = parseInt(document.getElementById('ourScore').value)||0;
  const theirScore = parseInt(document.getElementById('theirScore').value)||0;
  const opponentJa = document.getElementById('opponent').value;
  const exScoreL   = document.getElementById('exScoreL').value;
  const exScoreR   = document.getElementById('exScoreR').value;
  const pkScoreL   = document.getElementById('pkScoreL').value;
  const pkScoreR   = document.getElementById('pkScoreR').value;
  const extraTag   = document.getElementById('extraTag').value.trim();

  if (!tournament) { alert('大会名を選択してください'); return; }
  if (!opponentJa) { alert('対戦相手を選択してください'); return; }

  // 英語チーム名を取得
  const oppObj = opponents.find(o => o.name === opponentJa);
  const opponentEn = oppObj ? oppObj.nameEn : opponentJa.toUpperCase();

  const resultEmoji = result==='win'?'⚪':result==='loss'?'⚫':'△';
  const validScorers = scorerRows.filter(s=>s.name);

  // Icebergフォントが確実にロードされてから描画
  document.fonts.load('400 110px Nova Round').then(() => {
    drawCard({ourScore, theirScore, opponentEn, exScoreL, exScoreR, pkScoreL, pkScoreR});
  });
  buildCaption({tournament, category, resultEmoji, ourScore, theirScore, opponent:opponentJa, scorers:validScorers, extraTag});

  document.getElementById('outputWrap').style.display = 'block';
  setTimeout(() => document.getElementById('outputWrap').scrollIntoView({behavior:'smooth',block:'start'}), 80);
}

const LINE_IMG = new Image();
LINE_IMG.src = LINE_SRC;

const CW = 1080, CH = 1350;

// ── ピクセル実測確定座標（6.png）──────────────────
// 写真エリア（黒枠内側 実測値）
const PHOTO = {x:155, y:194, w:771, h:773};

// 得点エリア（青い四角）の中心
const SCORE = {
  L: {cx:250, cy:1082},
  R: {cx:829, cy:1082},
};
// EX得点（黄色い四角）の中心
const EX = {
  L: {cx:453, cy:1060},
  R: {cx:625, cy:1060},
};
// PK得点（ピンクの四角）の中心
const PK = {
  L: {cx:453, cy:1105},
  R: {cx:625, cy:1105},
};
// チーム名（緑の横長バー）の中心
const TEAM = {
  L: {cx:250, cy:1204},
  R: {cx:829, cy:1204},
};

function drawCard(d) {
  const canvas = document.getElementById('scoreCard');
  canvas.width = CW; canvas.height = CH;
  const ctx = canvas.getContext('2d');

  if (photoDataURL) {
    // 1. 写真を背景全面に cover で描画
    const img = new Image();
    img.onload = () => {
      const sc = Math.max(CW/img.width, CH/img.height);
      ctx.drawImage(img,
        (CW - img.width*sc)/2,
        (CH - img.height*sc)/2,
        img.width*sc, img.height*sc);

      // 2. 写真下部30%をグラデーションで薄く
      const gradY = CH * 0.7;
      const grad = ctx.createLinearGradient(0, gradY, 0, CH);
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(1, 'rgba(255,255,255,0.75)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, gradY, CW, CH - gradY);

      // 3. オーバーレイ：lightenモードで黒を消してテキスト/ロゴのみ残す
      ctx.globalCompositeOperation = 'lighten';
      ctx.drawImage(OVERLAY_IMG, 0, 0, CW, CH);
      ctx.globalCompositeOperation = 'source-over';

      // 3. スコア等を描画
      drawNumbers(ctx, d);
    };
    img.src = photoDataURL;
  } else {
    // 写真なし: ベース画像のみ
    ctx.drawImage(BASE_IMG, 0, 0, CW, CH);
    drawNumbers(ctx, d);
  }
}

function drawNumbers(ctx, d) {
  const {ourScore, theirScore, opponentEn, exScoreL, exScoreR, pkScoreL, pkScoreR} = d;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // ── 得点（グレー背景上・黒文字）──
  ctx.font = '400 220px Nova Round, sans-serif';
  ctx.fillStyle = '#111111';
  ctx.fillText(String(ourScore),   SCORE.L.cx, SCORE.L.cy);
  ctx.fillText(String(theirScore), SCORE.R.cx, SCORE.R.cy);

  // ── EX得点 + ラベル（両方入力時のみ）──
  ctx.font = '400 52px Nova Round, sans-serif';
  ctx.fillStyle = '#111111';
  if (exScoreL !== '' && exScoreR !== '') {
    ctx.fillText(String(exScoreL), EX.L.cx, EX.L.cy);
    ctx.fillText(String(exScoreR), EX.R.cx, EX.R.cy);
    ctx.fillText('EX', CW/2, EX.L.cy);
  }

  // ── PK得点 + ラベル（両方入力時のみ）──
  ctx.font = '400 52px Nova Round, sans-serif';
  ctx.fillStyle = '#111111';
  if (pkScoreL !== '' && pkScoreR !== '') {
    ctx.fillText(String(pkScoreL), PK.L.cx, PK.L.cy);
    ctx.fillText(String(pkScoreR), PK.R.cx, PK.R.cy);
    ctx.fillText('PK', CW/2, PK.L.cy);
  }

  // ── チーム名（黒文字）──
  ctx.font = '400 39px Nova Round, sans-serif';
  ctx.fillStyle = '#111111';
  ctx.fillText('VEERTIEN', TEAM.L.cx, TEAM.L.cy);
  ctx.fillText(opponentEn,  TEAM.R.cx, TEAM.R.cy);

  // ── エンブレム（左上固定・multiply合成で黒シルエット表示）──
  ctx.drawImage(EMBLEM_IMG, 16, 16, EMBLEM_W, EMBLEM_H);

  // ── 装飾ライン（PK下から開始・はみ出しOK）──
  const LINE_W = 246;
  const LINE_H = Math.round(462 * LINE_W / 190);  // ≈ 598px
  const LINE_Y = 1075;  // 1181から約106px上（半分）
  ctx.drawImage(LINE_IMG, CW/2 - LINE_W/2, LINE_Y, LINE_W, LINE_H);
}

// ════════════════════════════════════════
//  CAPTION
// ════════════════════════════════════════
function buildCaption({tournament,category,resultEmoji,ourScore,theirScore,opponent,scorers,extraTag}) {
  const lines = scorers.filter(s=>s.name).map(s=>`${s.name}${'⚽'.repeat(s.goals)}`).join('\n');
  const tags = ['#ヴィアティンBS','#ビーチサッカー','#浜松','#静岡',`#${tournament.replace(/[\s　]/g,'')}`];
  if (extraTag) tags.push(extraTag);
  const text =
    `【${tournament}】${category}\n\n${resultEmoji} ${ourScore}-${theirScore} 🆚${opponent}` +
    (lines ? `\n\n${lines}` : '') +
    `\n\n${tags.slice(0,5).join(' ')}`;
  document.getElementById('captionOut').textContent = text;
}

function downloadImage() {
  const t = (document.getElementById('tournament').value||'match').replace(/[\s　]+/g,'_');
  const a = document.createElement('a');
  a.download = `veertienbs_${t}.png`;
  a.href = document.getElementById('scoreCard').toDataURL('image/png');
  a.click();
}

function copyCaption() {
  navigator.clipboard.writeText(document.getElementById('captionOut').textContent).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ コピーしました';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

init();
</script>
